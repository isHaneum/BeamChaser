name: BeamChaser
options:
  bundleIdPrefix: com.haneum
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    DEVELOPMENT_TEAM: "65V7ZCL579"

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk.git
    version: 11.6.0
  GoogleSignInSDK:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  BeamChaser:
    type: application
    platform: iOS
    sources:
      - path: BeamChaser
        excludes:
          - "**/*.c"
          - "**/*.ino"
          - "**/* [0-9].swift"
          - "GoogleService-Info.plist"
          - "Resources/GoogleService-Info (1).plist"
          - "Resources/GoogleService-Info (2).plist"
      - path: Shared
    dependencies:
      - package: FirebaseSDK
        product: FirebaseCore
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseStorage
      - package: GoogleSignInSDK
        product: GoogleSignIn
    info:
      path: BeamChaser/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "러닝 경로를 추적하고 지도에 표시하기 위해 위치 정보가 필요합니다."
        NSLocationAlwaysAndWhenInUseUsageDescription: "백그라운드에서도 러닝 경로를 추적하기 위해 위치 정보가 필요합니다."
        NSBluetoothAlwaysUsageDescription: "런빔 레이저 장치와 연결하기 위해 블루투스가 필요합니다."
        NSPhotoLibraryUsageDescription: "피드에 사진을 첨부하기 위해 사진 접근이 필요합니다."
        NSContactsUsageDescription: "연락처에 있는 러너를 찾아 친구 요청을 보내기 위해 연락처 접근이 필요합니다."
        NSHealthShareUsageDescription: "러닝 기록을 Apple 건강 앱에서 확인하기 위해 건강 데이터 읽기 권한이 필요합니다."
        NSHealthUpdateUsageDescription: "러닝 운동 기록을 Apple 건강 앱에 저장하기 위해 건강 데이터 쓰기 권한이 필요합니다."
        NSAppleMusicUsageDescription: "러닝 중 재생 중인 음악 정보를 화면에 표시하기 위해 미디어 라이브러리 접근이 필요합니다."
        NSMotionUsageDescription: "보수계를 활용하여 더 정확한 거리와 페이스를 측정하기 위해 모션 데이터가 필요합니다."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.610484262284-afgq8v0n1ko8akc4jbddro08tcr8itco
        UIBackgroundModes:
          - bluetooth-central
          - location
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haneum.beamchaser
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "9"
    entitlements:
      path: BeamChaser/Resources/BeamChaser.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
        com.apple.BackgroundModes.bluetooth-central:
          enabled: true
        com.apple.BackgroundModes.location:
          enabled: true
        com.apple.HealthKit:
          enabled: true
        com.apple.SignInWithApple:
          enabled: true

  BeamChaserWatch:
    type: application
    platform: watchOS
    sources:
      - path: BeamChaserWatch/Sources
      - path: Shared
    resources:
      - path: BeamChaserWatch/Resources
    dependencies:
      - target: BeamChaser
        embed: false
    info:
      path: BeamChaserWatch/Resources/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.haneum.beamchaser
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "러닝 중 심박수를 표시하기 위해 건강 데이터 읽기가 필요합니다."
        NSHealthUpdateUsageDescription: "러닝 운동 기록을 저장하기 위해 건강 데이터 쓰기가 필요합니다."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haneum.beamchaser.watchapp
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "9"
        TARGETED_DEVICE_FAMILY: "4"
    entitlements:
      path: BeamChaserWatch/Resources/BeamChaserWatch.entitlements
      properties:
        com.apple.developer.healthkit: true

  BeamChaserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeamChaserTests
    dependencies:
      - target: BeamChaser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haneum.beamchaser.tests
        GENERATE_INFOPLIST_FILE: YES
